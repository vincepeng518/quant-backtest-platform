<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLMLite Router</title>
<style>
  :root { --bg:#0f1115; --panel:#1a1d24; --accent:#4f8cff; --txt:#e6e6e6; --mut:#8a8f98; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--txt); height:100vh; display:flex; flex-direction:column; }
  header { padding:12px 16px; background:var(--panel); border-bottom:1px solid #2a2e38; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; font-weight:600; }
  select, button, input { background:#242832; color:var(--txt); border:1px solid #333845; border-radius:6px; padding:7px 10px; font-size:13px; }
  button { background:var(--accent); border:none; cursor:pointer; font-weight:600; }
  button:hover { filter:brightness(1.1); }
  #status { font-size:12px; color:var(--mut); margin-left:auto; }
  #chat { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .msg { max-width:80%; padding:10px 13px; border-radius:10px; line-height:1.5; white-space:pre-wrap; word-break:break-word; }
  .user { align-self:flex-end; background:var(--accent); }
  .assistant { align-self:flex-start; background:var(--panel); border:1px solid #2a2e38; }
  .meta { font-size:11px; color:var(--mut); margin-bottom:3px; }
  #inputbar { padding:12px 16px; background:var(--panel); border-top:1px solid #2a2e38; display:flex; gap:10px; }
  #inputbar textarea { flex:1; resize:none; height:42px; background:#242832; color:var(--txt); border:1px solid #333845; border-radius:6px; padding:10px; font-family:inherit; font-size:13px; }
  .reasoning { font-size:11px; color:var(--mut); font-style:italic; margin-top:6px; border-top:1px dashed #2a2e38; padding-top:5px; }
</style>
</head>
<body>
<header>
  <h1>LLMLite Router</h1>
  <select id="model">
    <optgroup label="Novita">
      <option value="novita/tencent/hy3">novita/tencent-hy3</option>
    </optgroup>
    <optgroup label="OpenRouter (wildcard)">
      <option value="openrouter/tencent/hy3">openrouter/tencent-hy3</option>
      <option value="openrouter/anthropic/claude-3.5-sonnet">openrouter/claude-3.5-sonnet</option>
      <option value="openrouter/google/gemini-2.0-pro">openrouter/gemini-2.0-pro</option>
    </optgroup>
    <optgroup label="Qwen token-plan">
      <option value="qwen/qwen3.8-max-preview">qwen/qwen3.8-max-preview</option>
      <option value="qwen/qwen3.7-max">qwen/qwen3.7-max</option>
      <option value="qwen/qwen3.6-flash">qwen/qwen3.6-flash</option>
      <option value="qwen/deepseek-v3.2">qwen/deepseek-v3.2</option>
    </optgroup>
    <optgroup label="Ollama Cloud">
      <option value="ollama/nemotron-3-super">ollama/nemotron-3-super</option>
      <option value="ollama/deepseek-v4-flash">ollama/deepseek-v4-flash</option>
    </optgroup>
    <optgroup label="TokenFlux">
      <option value="tokenflux/gpt-5.6-sol">tokenflux/gpt-5.6-sol</option>
      <option value="tokenflux/gpt-5.6-terra">tokenflux/gpt-5.6-terra</option>
      <option value="tokenflux/gpt-5.4">tokenflux/gpt-5.4</option>
    </optgroup>
  </select>
  <input id="apikey" type="password" placeholder="master_key (leave if hardcoded)" style="width:220px;">
  <span id="status">ready</span>
</header>
<div id="chat"></div>
<div id="inputbar">
  <textarea id="prompt" placeholder="輸入訊息，Enter 發送（Shift+Enter 換行）"></textarea>
  <button id="send">發送</button>
</div>

<script>
const PROXY = "/litellm/v1/chat/completions";
const MASTER_KEY = ""; // 留空則用上方輸入框；或在此硬編碼
const chat = document.getElementById("chat");
const statusEl = document.getElementById("status");
let messages = [];

function addMsg(role, content, meta, reasoning) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  if (meta) {
    const m = document.createElement("div");
    m.className = "meta"; m.textContent = meta; div.appendChild(m);
  }
  const c = document.createElement("div");
  c.textContent = content; div.appendChild(c);
  if (reasoning) {
    const r = document.createElement("div");
    r.className = "reasoning"; r.textContent = "🧠 " + reasoning; div.appendChild(r);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const ta = document.getElementById("prompt");
  const text = ta.value.trim();
  if (!text) return;
  ta.value = "";
  const model = document.getElementById("model").value;
  const keyInput = document.getElementById("apikey").value.trim();
  const key = keyInput || MASTER_KEY;
  if (!key) { statusEl.textContent = "⚠ 需要 master_key"; return; }

  messages.push({ role: "user", content: text });
  addMsg("user", text, model);
  statusEl.textContent = "思考中…";
  const assistantDiv = document.createElement("div");
  assistantDiv.className = "msg assistant";
  chat.appendChild(assistantDiv);

  try {
    const resp = await fetch(PROXY, {
      method: "POST",
      headers: { "Authorization": "Bearer " + key, "Content-Type": "application/json" },
      body: JSON.stringify({ model, messages, max_tokens: 2000, stream: false })
    });
    const data = await resp.json();
    if (data.error) {
      assistantDiv.textContent = "❌ " + data.error.message;
      statusEl.textContent = "error";
      return;
    }
    const choice = data.choices[0];
    const content = choice.message.content || "";
    const reasoning = choice.message.reasoning_content || choice.message.reasoning || "";
    assistantDiv.innerHTML = "";
    addMsg("assistant", content, model, reasoning);
    messages.push({ role: "assistant", content });
    statusEl.textContent = "ready · " + (data.model || model);
  } catch (e) {
    assistantDiv.textContent = "❌ " + e.message;
    statusEl.textContent = "fetch error";
  }
}

document.getElementById("send").addEventListener("click", send);
document.getElementById("prompt").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
</script>
</body>
</html>
